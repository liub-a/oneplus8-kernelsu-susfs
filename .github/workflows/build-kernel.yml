name: Build OnePlus SM8250 Kernel

on:
  workflow_dispatch:
    inputs:
      device_name:
        description: "Output/device label used in the ZIP name"
        required: true
        default: "OnePlus9R_lemonades"
        type: string
      kernel_source:
        description: "Kernel source repository"
        required: true
        default: "https://github.com/LineageOS/android_kernel_oneplus_sm8250.git"
        type: string
      kernel_branch:
        description: "Kernel source branch"
        required: true
        default: "lineage-23.0"
        type: string
      defconfig:
        description: "Kernel defconfig"
        required: true
        default: "vendor/kona-perf_defconfig"
        type: string
      kernelsu_variant:
        description: "KernelSU variant"
        required: true
        default: "ksu"
        type: choice
        options:
          - ksu
          - next
          - sukisu
          - rsuntk
      kernelsu_ref:
        description: "KernelSU tag/commit used when kernelsu_variant=ksu"
        required: true
        default: "v0.9.5"
        type: string
      susfs_enabled:
        description: "Enable SuSFS patches"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      susfs_branch:
        description: "SuSFS kernel patch branch"
        required: true
        default: "kernel-4.19"
        type: string
      allow_experimental_susfs_variant:
        description: "Allow non-ksu variants with the selected SuSFS patch set"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      create_release:
        description: "Create a GitHub Release after a successful build"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

env:
  PATCHES_REPO: JackA1ltman/NonGKI_Kernel_Patches
  PATCHES_BRANCH: op_kernel

jobs:
  build:
    name: Build kernel
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup build packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            cpio \
            curl \
            flex \
            git \
            libelf-dev \
            libssl-dev \
            python3 \
            unzip \
            wget \
            zip

      - name: Setup Clang
        run: |
          mkdir -p toolchains/clang
          curl -sL "https://github.com/ZyCromerZ/Clang/releases/download/14.0.6-20250704-release/Clang-14.0.6-20250704.tar.gz" | \
            tar -xzf - -C toolchains/clang
          echo "$GITHUB_WORKSPACE/toolchains/clang/bin" >> "$GITHUB_PATH"

      - name: Setup Android GCC
        run: |
          git clone --depth=1 -b android12L-release \
            https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
            toolchains/gcc64
          git clone --depth=1 -b android12L-release \
            https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 \
            toolchains/gcc32
          echo "$GITHUB_WORKSPACE/toolchains/gcc64/bin" >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/toolchains/gcc32/bin" >> "$GITHUB_PATH"

      - name: Prepare output directory
        run: |
          sudo mkdir -p /output
          sudo chown -R "$USER:$USER" /output

      - name: Build with build.sh
        env:
          KERNEL_SOURCE: ${{ inputs.kernel_source }}
          KERNEL_BRANCH: ${{ inputs.kernel_branch }}
          DEFCONFIG: ${{ inputs.defconfig }}
          DEVICE_NAME: ${{ inputs.device_name }}
          KERNELSU_VARIANT: ${{ inputs.kernelsu_variant }}
          KERNELSU_REF: ${{ inputs.kernelsu_ref }}
          SUSFS_ENABLED: ${{ inputs.susfs_enabled }}
          SUSFS_BRANCH: ${{ inputs.susfs_branch }}
          ALLOW_EXPERIMENTAL_SUSFS_VARIANT: ${{ inputs.allow_experimental_susfs_variant }}
          PATCHES_REPO: ${{ env.PATCHES_REPO }}
          PATCHES_BRANCH: ${{ env.PATCHES_BRANCH }}
        run: |
          chmod +x build.sh
          bash build.sh

      - name: Show output files
        if: always()
        run: |
          echo "Output files:"
          ls -lah /output || true
          echo "Kernel build log:"
          tail -n 200 kernel_source/build.log || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ inputs.device_name }}-${{ inputs.kernelsu_variant }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: /output/*
          if-no-files-found: error

      - name: Create release
        if: ${{ inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}-${{ github.run_attempt }}
          name: Kernel Build ${{ github.run_id }}.${{ github.run_attempt }}
          files: /output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
